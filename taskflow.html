<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Epilogue:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #f7f4ef;
    --bg2:      #efeae2;
    --bg3:      #e6dfd4;
    --card:     #fdfaf6;
    --line:     #ddd8cf;
    --muted:    #b8b0a4;
    --mid:      #7a7268;
    --text:     #2a2520;
    --ink:      #1a1612;
    --accent:   #c84b2f;
    --accent2:  #2f6bc8;
    --green:    #2a7a4b;
    --yellow:   #c8972f;
    --font-serif: 'Instrument Serif', serif;
    --font-sans:  'Epilogue', sans-serif;
    --shadow:   0 2px 12px rgba(42,37,32,0.08);
    --shadow-lg: 0 8px 32px rgba(42,37,32,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
  }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--line);
  }
  .logo {
    font-family: var(--font-serif);
    font-size: 26px;
    color: var(--ink);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sidebar-section { padding: 20px 16px 8px; }
  .sidebar-section-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--mid);
    user-select: none;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--bg2); color: var(--text); }
  .nav-item.active { background: var(--bg2); color: var(--ink); font-weight: 500; }
  .nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; }
  .nav-item .nav-count {
    margin-left: auto;
    background: var(--bg3);
    color: var(--mid);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
  }
  .nav-item.active .nav-count { background: var(--accent); color: white; }

  .sidebar-footer {
    margin-top: auto;
    padding: 20px 24px;
    border-top: 1px solid var(--line);
  }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .stat-box {
    background: var(--bg2);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .stat-num {
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
  }
  .page-title {
    font-family: var(--font-serif);
    font-size: 28px;
    color: var(--ink);
    letter-spacing: -0.5px;
    flex: 1;
  }
  .page-title em { color: var(--accent); }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 14px;
    width: 220px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    border: none;
    background: transparent;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 13px; }

  .btn-add {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: transparent;
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--muted); color: var(--text); }
  .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }
  .filter-sep { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
  .sort-label { font-size: 11px; color: var(--muted); margin-left: auto; }
  .sort-select {
    border: 1px solid var(--line);
    background: transparent;
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--mid);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  /* KANBAN */
  .kanban {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  .column {
    background: var(--bg2);
    border-radius: 10px;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .column-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--line);
    background: var(--card);
  }
  .column-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .col-todo .column-dot { background: var(--yellow); }
  .col-doing .column-dot { background: var(--accent2); }
  .col-done .column-dot { background: var(--green); }

  .column-title {
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    flex: 1;
  }
  .column-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .col-todo .column-badge { background: rgba(200,151,47,0.15); color: var(--yellow); }
  .col-doing .column-badge { background: rgba(47,107,200,0.12); color: var(--accent2); }
  .col-done .column-badge { background: rgba(42,122,75,0.12); color: var(--green); }

  .column-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 80px;
  }

  /* TASK CARD */
  .task-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .task-card.priority-high::before { background: var(--accent); }
  .task-card.priority-med::before { background: var(--yellow); }
  .task-card.priority-low::before { background: var(--green); }

  .task-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

  .task-top {
    display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
  }
  .task-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: white;
    transition: all 0.15s;
    background: transparent;
  }
  .task-check.checked { background: var(--green); border-color: var(--green); }

  .task-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
    flex: 1;
  }
  .task-title.done-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-desc {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .task-footer {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .task-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .tag-design { background: rgba(200,75,47,0.1); color: var(--accent); }
  .tag-dev { background: rgba(47,107,200,0.1); color: var(--accent2); }
  .tag-game { background: rgba(42,122,75,0.1); color: var(--green); }
  .tag-research { background: rgba(200,151,47,0.1); color: var(--yellow); }

  .task-due {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .task-due.overdue { color: var(--accent); font-weight: 500; }

  .task-actions {
    position: absolute; top: 8px; right: 8px;
    display: none; gap: 4px;
  }
  .task-card:hover .task-actions { display: flex; }
  .task-action-btn {
    width: 24px; height: 24px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--mid);
    transition: all 0.15s;
  }
  .task-action-btn:hover { background: var(--bg2); color: var(--ink); }
  .task-action-btn.del:hover { background: rgba(200,75,47,0.1); color: var(--accent); border-color: var(--accent); }

  /* EMPTY STATE */
  .empty-col {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,22,18,0.5);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--line);
    width: 480px;
    max-width: 95vw;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--ink);
  }
  .modal-close {
    width: 28px; height: 28px;
    border: 1px solid var(--line);
    background: var(--bg2);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--mid);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--bg3); color: var(--ink); }
  .modal-body { padding: 20px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn-cancel {
    padding: 9px 18px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--bg2); color: var(--ink); }
  .btn-save {
    padding: 9px 22px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* PROGRESS BAR */
  .progress-bar {
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--yellow));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    display: flex; justify-content: space-between;
  }

  /* LIST VIEW */
  .list-view { display: none; flex-direction: column; gap: 8px; }
  .list-view.active { display: flex; }
  .kanban.hidden { display: none; }

  .list-item {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .list-item:hover { box-shadow: var(--shadow); }
  .list-status {
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .status-todo { background: rgba(200,151,47,0.15); color: var(--yellow); }
  .status-doing { background: rgba(47,107,200,0.12); color: var(--accent2); }
  .status-done { background: rgba(42,122,75,0.12); color: var(--green); }

  .view-toggle {
    display: flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
  }
  .view-btn {
    padding: 7px 12px; background: transparent; border: none;
    font-size: 13px; cursor: pointer; color: var(--muted);
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--ink); color: white; }

  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .kanban { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
    .sidebar-footer { display: none; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Task<span>Flow</span></div>
      <div class="logo-sub">Personal Workspace</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Views</div>
      <div class="nav-item active" data-filter="all" onclick="setFilter('all', this)">
        <span class="nav-icon">◈</span> All Tasks
        <span class="nav-count" id="count-all">0</span>
      </div>
      <div class="nav-item" data-filter="todo" onclick="setFilter('todo', this)">
        <span class="nav-icon">○</span> To Do
        <span class="nav-count" id="count-todo">0</span>
      </div>
      <div class="nav-item" data-filter="doing" onclick="setFilter('doing', this)">
        <span class="nav-icon">◑</span> In Progress
        <span class="nav-count" id="count-doing">0</span>
      </div>
      <div class="nav-item" data-filter="done" onclick="setFilter('done', this)">
        <span class="nav-icon">●</span> Completed
        <span class="nav-count" id="count-done">0</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Priority</div>
      <div class="nav-item" data-filter="high" onclick="setFilter('high', this)">
        <span class="nav-icon" style="color:var(--accent)">▲</span> High Priority
        <span class="nav-count" id="count-high">0</span>
      </div>
      <div class="nav-item" data-filter="med" onclick="setFilter('med', this)">
        <span class="nav-icon" style="color:var(--yellow)">▲</span> Medium
        <span class="nav-count" id="count-med">0</span>
      </div>
      <div class="nav-item" data-filter="low" onclick="setFilter('low', this)">
        <span class="nav-icon" style="color:var(--green)">▲</span> Low Priority
        <span class="nav-count" id="count-low">0</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span>Progress</span>
        <span id="progressText">0 / 0 done</span>
      </div>
      <div class="stats-grid" style="margin-top:14px">
        <div class="stat-box">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-done">0</div>
          <div class="stat-label">Done</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">All <em>Tasks</em></div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search tasks..." id="searchInput" oninput="renderAll()"/>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('kanban', this)">⊞</button>
        <button class="view-btn" onclick="setView('list', this)">☰</button>
      </div>
      <button class="btn-add" onclick="openModal()">+ New Task</button>
    </div>

    <div class="content">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setTagFilter('all', this)">All Tags</button>
        <div class="filter-sep"></div>
        <button class="filter-btn" onclick="setTagFilter('design', this)">Design</button>
        <button class="filter-btn" onclick="setTagFilter('dev', this)">Dev</button>
        <button class="filter-btn" onclick="setTagFilter('game', this)">Game</button>
        <button class="filter-btn" onclick="setTagFilter('research', this)">Research</button>
        <span class="sort-label">Sort by:</span>
        <select class="sort-select" id="sortSelect" onchange="renderAll()">
          <option value="created">Date Added</option>
          <option value="priority">Priority</option>
          <option value="due">Due Date</option>
          <option value="title">Title</option>
        </select>
      </div>

      <!-- KANBAN VIEW -->
      <div class="kanban" id="kanbanView">
        <div class="column col-todo" id="col-todo">
          <div class="column-header">
            <div class="column-dot"></div>
            <div class="column-title">To Do</div>
            <span class="column-badge" id="badge-todo">0</span>
          </div>
          <div class="column-body" id="body-todo"></div>
        </div>
        <div class="column col-doing" id="col-doing">
          <div class="column-header">
            <div class="column-dot"></div>
            <div class="column-title">In Progress</div>
            <span class="column-badge" id="badge-doing">0</span>
          </div>
          <div class="column-body" id="body-doing"></div>
        </div>
        <div class="column col-done" id="col-done">
          <div class="column-header">
            <div class="column-dot"></div>
            <div class="column-title">Completed</div>
            <span class="column-badge" id="badge-done">0</span>
          </div>
          <div class="column-body" id="body-done"></div>
        </div>
      </div>

      <!-- LIST VIEW -->
      <div class="list-view" id="listView"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Task</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input class="form-input" id="inputTitle" placeholder="What needs to be done?"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="inputDesc" placeholder="Add details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="inputStatus">
            <option value="todo">To Do</option>
            <option value="doing">In Progress</option>
            <option value="done">Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="inputPriority">
            <option value="high">High</option>
            <option value="med">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tag</label>
          <select class="form-select" id="inputTag">
            <option value="dev">Dev</option>
            <option value="design">Design</option>
            <option value="game">Game</option>
            <option value="research">Research</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input class="form-input" id="inputDue" type="date"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || 'null') || [
    { id: 1, title: 'Design homepage wireframe', desc: 'Create low-fidelity wireframes in Figma for the main landing page.', status: 'done', priority: 'high', tag: 'design', due: '2025-03-10', created: 1 },
    { id: 2, title: 'Build navigation component', desc: 'Responsive navbar with mobile hamburger menu using HTML/CSS/JS.', status: 'doing', priority: 'high', tag: 'dev', due: '2025-03-20', created: 2 },
    { id: 3, title: 'Write Python data parser', desc: 'Script to parse and clean CSV data for the sentiment analysis project.', status: 'todo', priority: 'med', tag: 'dev', due: '2025-03-25', created: 3 },
    { id: 4, title: 'Research Unity shader techniques', desc: 'Look into custom HLSL shaders for the Voidrun game project.', status: 'todo', priority: 'med', tag: 'game', due: '2025-03-28', created: 4 },
    { id: 5, title: 'Create colour system in Figma', desc: 'Define the full design token system — colours, spacing, type scales.', status: 'doing', priority: 'low', tag: 'design', due: '2025-04-01', created: 5 },
    { id: 6, title: 'Implement game physics prototype', desc: 'Set up Rigidbody and gravity mechanics in Unity for the puzzle game.', status: 'todo', priority: 'high', tag: 'game', due: '2025-04-05', created: 6 },
  ];

  let nextId = Math.max(...tasks.map(t => t.id), 0) + 1;
  let currentFilter = 'all';
  let currentTagFilter = 'all';
  let currentView = 'kanban';

  function save() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;
    let filtered = tasks.filter(t => {
      if (currentFilter === 'all') {}
      else if (['todo','doing','done'].includes(currentFilter) && t.status !== currentFilter) return false;
      else if (['high','med','low'].includes(currentFilter) && t.priority !== currentFilter) return false;
      if (currentTagFilter !== 'all' && t.tag !== currentTagFilter) return false;
      if (search && !t.title.toLowerCase().includes(search) && !t.desc.toLowerCase().includes(search)) return false;
      return true;
    });
    const pOrder = { high: 0, med: 1, low: 2 };
    filtered.sort((a, b) => {
      if (sort === 'priority') return pOrder[a.priority] - pOrder[b.priority];
      if (sort === 'due') return (a.due || 'z') < (b.due || 'z') ? -1 : 1;
      if (sort === 'title') return a.title.localeCompare(b.title);
      return a.created - b.created;
    });
    return filtered;
  }

  function renderAll() {
    const filtered = getFiltered();
    updateCounts();
    if (currentView === 'kanban') renderKanban(filtered);
    else renderList(filtered);
  }

  function renderKanban(filtered) {
    ['todo','doing','done'].forEach(s => {
      const body = document.getElementById('body-' + s);
      const items = filtered.filter(t => t.status === s);
      document.getElementById('badge-' + s).textContent = items.length;
      if (!items.length) { body.innerHTML = '<div class="empty-col">No tasks here</div>'; return; }
      body.innerHTML = items.map(t => taskCardHTML(t)).join('');
    });
  }

  function renderList(filtered) {
    const lv = document.getElementById('listView');
    if (!filtered.length) { lv.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;font-style:italic;">No tasks found</div>'; return; }
    lv.innerHTML = filtered.map(t => `
      <div class="list-item" onclick="editTask(${t.id})">
        <span class="list-status status-${t.status}">${t.status === 'todo' ? 'To Do' : t.status === 'doing' ? 'In Progress' : 'Done'}</span>
        <span style="flex:1;font-size:13px;font-weight:500;color:var(--ink);${t.status==='done'?'text-decoration:line-through;color:var(--muted)':''}">${t.title}</span>
        <span class="task-tag tag-${t.tag}">${t.tag}</span>
        <span style="font-size:11px;color:var(--muted)">${t.due || '—'}</span>
        <button onclick="event.stopPropagation();deleteTask(${t.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:4px 6px;border-radius:4px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">✕</button>
      </div>`).join('');
  }

  function taskCardHTML(t) {
    const today = new Date().toISOString().split('T')[0];
    const overdue = t.due && t.due < today && t.status !== 'done';
    return `
    <div class="task-card priority-${t.priority}" onclick="editTask(${t.id})">
      <div class="task-actions">
        <button class="task-action-btn" title="Edit" onclick="event.stopPropagation();editTask(${t.id})">✎</button>
        <button class="task-action-btn del" title="Delete" onclick="event.stopPropagation();deleteTask(${t.id})">✕</button>
      </div>
      <div class="task-top">
        <div class="task-check ${t.status==='done'?'checked':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${t.status==='done'?'✓':''}</div>
        <div class="task-title ${t.status==='done'?'done-text':''}">${t.title}</div>
      </div>
      ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
      <div class="task-footer">
        <span class="task-tag tag-${t.tag}">${t.tag}</span>
        ${t.due ? `<span class="task-due ${overdue?'overdue':''}">📅 ${t.due}</span>` : ''}
      </div>
    </div>`;
  }

  function updateCounts() {
    const all = tasks;
    document.getElementById('count-all').textContent = all.length;
    document.getElementById('count-todo').textContent = all.filter(t=>t.status==='todo').length;
    document.getElementById('count-doing').textContent = all.filter(t=>t.status==='doing').length;
    document.getElementById('count-done').textContent = all.filter(t=>t.status==='done').length;
    document.getElementById('count-high').textContent = all.filter(t=>t.priority==='high').length;
    document.getElementById('count-med').textContent = all.filter(t=>t.priority==='med').length;
    document.getElementById('count-low').textContent = all.filter(t=>t.priority==='low').length;
    document.getElementById('stat-total').textContent = all.length;
    const doneCount = all.filter(t=>t.status==='done').length;
    document.getElementById('stat-done').textContent = doneCount;
    const pct = all.length ? Math.round(doneCount / all.length * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${doneCount} / ${all.length} done`;
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    const titles = { all:'All Tasks', todo:'To Do', doing:'In Progress', done:'Completed', high:'High Priority', med:'Medium Priority', low:'Low Priority' };
    document.getElementById('pageTitle').innerHTML = titles[f].replace(/(\w+)$/, '<em>$1</em>');
    renderAll();
  }

  function setTagFilter(tag, el) {
    currentTagFilter = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderAll();
  }

  function setView(v, el) {
    currentView = v;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    if (v === 'kanban') {
      document.getElementById('kanbanView').classList.remove('hidden');
      document.getElementById('listView').classList.remove('active');
    } else {
      document.getElementById('kanbanView').classList.add('hidden');
      document.getElementById('listView').classList.add('active');
    }
    renderAll();
  }

  function openModal(task) {
    document.getElementById('editId').value = task ? task.id : '';
    document.getElementById('modalTitle').textContent = task ? 'Edit Task' : 'New Task';
    document.getElementById('inputTitle').value = task ? task.title : '';
    document.getElementById('inputDesc').value = task ? task.desc : '';
    document.getElementById('inputStatus').value = task ? task.status : 'todo';
    document.getElementById('inputPriority').value = task ? task.priority : 'med';
    document.getElementById('inputTag').value = task ? task.tag : 'dev';
    document.getElementById('inputDue').value = task ? task.due : '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputTitle').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function saveTask() {
    const title = document.getElementById('inputTitle').value.trim();
    if (!title) { showToast('Please enter a task title'); return; }
    const id = document.getElementById('editId').value;
    if (id) {
      const t = tasks.find(t => t.id == id);
      if (t) { t.title = title; t.desc = document.getElementById('inputDesc').value; t.status = document.getElementById('inputStatus').value; t.priority = document.getElementById('inputPriority').value; t.tag = document.getElementById('inputTag').value; t.due = document.getElementById('inputDue').value; }
      showToast('Task updated ✓');
    } else {
      tasks.push({ id: nextId++, title, desc: document.getElementById('inputDesc').value, status: document.getElementById('inputStatus').value, priority: document.getElementById('inputPriority').value, tag: document.getElementById('inputTag').value, due: document.getElementById('inputDue').value, created: Date.now() });
      showToast('Task added ✓');
    }
    save(); closeModal(); renderAll();
  }

  function editTask(id) { openModal(tasks.find(t => t.id === id)); }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); renderAll(); showToast('Task deleted');
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.status = t.status === 'done' ? 'todo' : 'done';
    save(); renderAll();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  renderAll();
</script>
</body>
</html>
